<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flash Player | Krecak Kreations</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        /* Force the body to be a flex container that fills the window */
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #000;
        }

        /* The game container fills all remaining space below the nav */
        #ruffle-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        /* Ensure the Ruffle element itself expands */
        ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <nav id="nav">
        <a href="index.html" class="back-btn">← BACK TO GAMES</a>
        <span id="game-title" style="margin-left: 20px; font-weight: bold; color: #eee; text-transform: uppercase;"></span>
        <div style="width: 100px;"></div> </nav>

    <div id="ruffle-container"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gamePath = params.get('game');
        
        if (gamePath) {
            const decodedPath = decodeURIComponent(gamePath);
            
            // Set the title in the nav
            const fileName = decodedPath.split('/').pop().replace('.swf', '').replace(/[-_]/g, ' ');
            document.getElementById('game-title').innerText = fileName;

            // Initialize Ruffle
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);
            
            // Load the game
            player.load(decodedPath);
        }
    </script>
</body>
</html>
