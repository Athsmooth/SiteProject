<!DOCTYPE html>
<html>
<head>
    <title>Flash Player | Krecak</title>
    <link rel="stylesheet" href="style.css"> <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        body { margin: 0; background: #090412; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #ruffle-container { flex-grow: 1; width: 100%; height: 100%; }
        #nav { height: 60px; background: #11111b; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #222; }
        .back-btn { color: #ff9800; text-decoration: none; border: 1px solid #ff9800; padding: 8px 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="nav">
        <a href="index.html" class="back-btn">← BACK</a>
        <span id="title" style="margin-left:20px; color:white; font-weight:bold;"></span>
    </div>
    <div id="ruffle-container"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gamePath = params.get('game');
        
        if (gamePath) {
            const decodedPath = decodeURIComponent(gamePath);
            document.getElementById('title').innerText = decodedPath.split('/').pop().toUpperCase();

            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("ruffle-container").appendChild(player);
            
            // This loads the EXACT path (e.g. swf/games/hero.swf)
            player.load(decodedPath);
        }
    </script>
</body>
</html>
