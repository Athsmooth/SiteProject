<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Player | Krecak Kreations</title>
    <style>
        :root { --accent: #00ffcc; --bg: #090412; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #controls { padding: 10px 20px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .btn:hover { background: var(--accent); color: var(--bg); }
        #ruffle-container { flex-grow: 1; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        ruffle-player { width: 100%; height: 100%; }
    </style>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>

    <div id="controls">
        <a href="index.html" class="btn">← BACK</a>
        <div id="game-title">LOADING...</div>
        <button class="btn" onclick="toggleFullscreen()">FULLSCREEN</button>
    </div>

    <div id="ruffle-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        
        window.addEventListener("load", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const gameName = urlParams.get('game');
            const container = document.getElementById("ruffle-container");
            const titleEl = document.getElementById("game-title");

            if (!gameName || !gameName.toLowerCase().endsWith('.swf')) {
                container.innerHTML = `<div style="text-align:center"><h2>Invalid Game File</h2><p>Ruffle can only play .swf files. Check your file extension.</p></div>`;
                return;
            }

            titleEl.innerText = gameName.split('.')[0].replace(/[-_]/g, ' ').toUpperCase();

            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            container.appendChild(player);

            // Try both possible locations found in your file hierarchy
            const paths = [`./swf/games/${gameName}`, `./swf/${gameName}`];
            let success = false;

            for (let path of paths) {
                try {
                    await player.load(path);
                    success = true;
                    break;
                } catch (e) { continue; }
            }

            if (!success) {
                container.innerHTML = `<h2 style="color:#ff4444">Could not locate ${gameName}</h2>`;
            }
        });

        function toggleFullscreen() {
            const el = document.getElementById("ruffle-container");
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
