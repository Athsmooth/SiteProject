<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flash Player</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #nav { padding: 10px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .btn { color: #00ffcc; border: 1px solid #00ffcc; padding: 5px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; }
        #ruffle-container { flex-grow: 1; width: 100%; height: 100%; }
        ruffle-player { width: 100%; height: 100%; }
    </style>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>
    <div id="nav">
        <a href="index.html" class="btn">← BACK</a>
        <div id="title">FLASH PLAYER</div>
        <div style="width:70px"></div>
    </div>
    <div id="ruffle-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const game = urlParams.get('game');
            if (!game || !game.toLowerCase().endsWith('.swf')) {
                document.getElementById('ruffle-container').innerHTML = "<h2>Invalid Flash File</h2>";
                return;
            }

            document.getElementById('title').innerText = decodeURIComponent(game).toUpperCase();
            
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);

            // Try the subfolder first, then the root
            const locations = [`./swf/games/${game}`, `./swf/${game}`];
            for (let path of locations) {
                try {
                    const check = await fetch(path, { method: 'HEAD' });
                    if (check.ok) {
                        await player.load(path);
                        return;
                    }
                } catch (e) {}
            }
            container.innerHTML = "<h2>Game not found in /swf/ or /swf/games/</h2>";
        });
    </script>
</body>
</html>
