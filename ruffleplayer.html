<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Player | Krecak Kreations</title>
    <style>
        :root { --accent: #00ffcc; --bg: #090412; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #controls { padding: 10px 20px; background: #1a1a2e; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; transition: 0.3s; font-size: 13px; }
        .btn:hover { background: var(--accent); color: var(--bg); }
        #ruffle-container { flex-grow: 1; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; }
        ruffle-player { width: 100%; height: 100%; }
        #error-log { color: #ff4444; padding: 20px; text-align: center; display: none; }
    </style>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>

    <div id="controls">
        <a href="index.html" class="btn">← BACK</a>
        <div id="game-title">LOADING...</div>
        <button class="btn" onclick="toggleFullscreen()">FULLSCREEN</button>
    </div>

    <div id="error-log"></div>
    <div id="ruffle-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        
        window.addEventListener("load", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const gameName = urlParams.get('game');
            const container = document.getElementById("ruffle-container");
            const titleEl = document.getElementById("game-title");
            const errorEl = document.getElementById("error-log");

            if (!gameName) {
                container.innerHTML = "<h2>No game selected.</h2>";
                return;
            }

            titleEl.innerText = decodeURIComponent(gameName).replace('.swf', '').toUpperCase();

            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            container.innerHTML = ""; 
            container.appendChild(player);

            // We will try these two paths specifically based on your screenshot
            const path1 = `./swf/games/${gameName}`;
            const path2 = `./swf/${gameName}`;

            try {
                // Attempt 1
                console.log("Trying Path 1:", path1);
                await player.load(path1);
            } catch (err) {
                console.warn("Path 1 failed, trying Path 2...");
                try {
                    // Attempt 2
                    await player.load(path2);
                } catch (err2) {
                    container.style.display = "none";
                    errorEl.style.display = "block";
                    errorEl.innerHTML = `
                        <h2>Game Failed to Load</h2>
                        <p>File: ${gameName}</p>
                        <p style="font-size:12px; opacity:0.6;">Checked: ${path1} and ${path2}</p>
                        <a href="index.html" class="btn">Go Back</a>
                    `;
                }
            }
        });

        function toggleFullscreen() {
            const el = document.getElementById("ruffle-container");
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
