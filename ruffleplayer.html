<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Player | Krecak Kreations</title>
    <style>
        :root { 
            --accent: #00ffcc; 
            --bg: #090412; 
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        #controls { 
            padding: 10px 20px; 
            background: rgba(255,255,255,0.05); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #333;
            z-index: 10;
        }
        .btn { 
            background: transparent; 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            padding: 8px 15px; 
            border-radius: 5px; 
            cursor: pointer; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 13px; 
            transition: 0.3s; 
        }
        .btn:hover { 
            background: var(--accent); 
            color: var(--bg); 
        }
        #game-title {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #eee;
        }
        #ruffle-container { 
            flex-grow: 1; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000;
        }
        ruffle-player { 
            width: 100%; 
            height: 100%; 
        }
    </style>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>

    <div id="controls">
        <a href="index.html" class="btn">← BACK TO HOME</a>
        <div id="game-title">INITIALIZING...</div>
        <button class="btn" onclick="toggleFullscreen()">FULLSCREEN</button>
    </div>

    <div id="ruffle-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        
        window.addEventListener("load", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const gameName = urlParams.get('game');
            const container = document.getElementById("ruffle-container");
            const titleEl = document.getElementById("game-title");

            if (!gameName) {
                container.innerHTML = "<h2 style='color:white'>Error: No game specified.</h2>";
                titleEl.innerText = "ERROR";
                return;
            }

            // Clean up the title display
            titleEl.innerText = decodeURIComponent(gameName).replace('.swf', '').replace(/[-_]/g, ' ');

            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            
            // Clear container to prevent "wrong game" ghosting from cache
            container.innerHTML = ""; 
            container.appendChild(player);

            // Path list based on your folder structure
            const pathsToTry = [
                `./swf/games/${gameName}`,
                `./swf/${gameName}`
            ];

            let success = false;
            for (let path of pathsToTry) {
                try {
                    console.log("Checking path:", path);
                    const response = await fetch(path, { method: 'HEAD' });
                    if (response.ok) {
                        await player.load(path);
                        success = true;
                        console.log("✅ Loaded successfully from:", path);
                        break;
                    }
                } catch (e) {
                    console.warn("Path failed:", path);
                }
            }

            if (!success) {
                container.innerHTML = `<div style="text-align:center; padding: 50px;">
                    <h2 style="color:#ff444
