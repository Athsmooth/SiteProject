<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game { width: 100vw; height: 100vh; }
    </style>
</head>
<div id="game"></div>
<script>
    const params = new URLSearchParams(window.location.search);
    const rom = params.get('game');

    if (rom) {
        window.EJS_player = "#game";
        window.EJS_gameUrl = rom.startsWith('/') ? rom : '/' + rom;
        
        // Use a relative path for the server
        window.EJS_pathtodata = "/data/"; 
        
        window.EJS_startOnLoaded = true;

        // Force the core name to match your file exactly
        const ext = rom.toLowerCase().split('.').pop();
        if (ext === 'gba') {
            window.EJS_core = 'mgba'; 
        } else {
            window.EJS_core = 'gambatte'; 
        }

        const loader = document.createElement('script');
        loader.src = "data/loader.js"; 
        document.head.appendChild(loader);
    }
</script>
</body>
</html>
