<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #game-container { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        // 1. Get the game path from the URL
        const params = new URLSearchParams(window.location.search);
        const rom = params.get('game');

        if (rom) {
            window.EJS_player = "#game-container";
            
            // 2. Decode the URL (handles spaces and special characters)
            window.EJS_gameUrl = decodeURIComponent(rom);
            
            // 3. Point to your LOCAL folder for the engine
            // Make sure this matches your folder name EXACTLY (case-sensitive)
            // Replace the old EJS_pathtodata line with this:
            window.EJS_pathtodata = "/emulatorjsdata/";

            // 4. Smart Core Detection: Checks file extension
            const lowerRom = rom.toLowerCase();
            if (lowerRom.endsWith('.gba')) {
                window.EJS_core = 'gba';
            } else if (lowerRom.endsWith('.gbc') || lowerRom.endsWith('.gb')) {
                window.EJS_core = 'gbc';
            } else {
                window.EJS_core = 'gba'; // Fallback
            }
        } else {
            document.body.innerHTML = "<h1 style='color:white; text-align:center;'>No game selected.</h1>";
        }
    </script>

    <script src="/emulatorjsdata/loader.js"></script>
</body>
</html>
