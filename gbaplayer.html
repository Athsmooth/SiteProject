<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0d1117; color: white; overflow: hidden; }
        #game { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="game"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rom = params.get('game');

        if (rom) {
            window.EJS_player = "#game";
            window.EJS_gameUrl = decodeURIComponent(rom);
            window.EJS_core = rom.toLowerCase().includes('.gba') ? 'gba' : 'gbc';
            
            // MAKE SURE THIS MATCHES YOUR FOLDER NAME EXACTLY
            window.EJS_pathtodata = "emulatorjsdata/"; 
        } else {
            document.body.innerHTML = "<h1>No game selected. Check your link!</h1>";
        }
    </script>
    
    <script src="emulatorjsdata/loader.js"></script>
</body>
</html>
