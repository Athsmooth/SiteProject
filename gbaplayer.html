<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0d1117; color: white; overflow: hidden; }
        #game { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="game"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rom = params.get('game');

        if (rom) {
            window.EJS_player = "#game-container";
            window.EJS_gameUrl = decodeURIComponent(rom);
            
            // Convert to lowercase to catch .GBC and .gbc
            const fileExt = rom.toLowerCase();

            if (fileExt.endsWith('.gba')) {
                window.EJS_core = 'gba';
            } else if (fileExt.endsWith('.gbc') || fileExt.endsWith('.gb')) {
                window.EJS_core = 'gbc';
            } else {
                // Default fallback if extension is weird
                window.EJS_core = 'gba'; 
            }

            window.EJS_pathtodata = "emulatorjsdata/"; 
        }
    </script>
    <script src="emulatorjsdata/loader.js"></script>
</body>
</html>
