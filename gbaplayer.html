<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Player</title>
    <link rel="stylesheet" href="style.css"> <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0d1117; overflow: hidden; }
        #game-container { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rawPath = params.get('game');

        if (rawPath) {
            // Decodes %20 back into spaces for the emulator
            const romPath = decodeURIComponent(rawPath);

            EJS_player = "#game-container";
            EJS_gameUrl = romPath; // This will be "gba/Asteroids (USA).gbc"
            EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            
            // Core detection
            const ext = romPath.split('.').pop().toLowerCase();
            if (ext === 'gba') { EJS_core = "gba"; }
            else { EJS_core = "gbc"; } // Default for .gbc and .gb

            EJS_BackgroundColor = "#0d1117";
            EJS_ButtonsTextColor = "#8b949e";
        } else {
            document.body.innerHTML = "<h1 style='color:white; text-align:center;'>No Game Selected</h1>";
        }
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
