<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Student</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
    <link rel="icon" type="image/png" href="assets/favicons/favicon.png">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <script src="navigationinject.js"></script>
    <div id="game"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const rom = params.get('game');
    
    if (rom) {
        // Basic required settings
        window.EJS_player = "#game";
        window.EJS_gameUrl = rom;
        window.EJS_startOnLoaded = true;

        // Use the most recent stable version from CDN
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

        // Force GBA core (mgba is much better than gambatte for GBA)
        window.EJS_core = "mgba";

        // Remove your old custom EJS_paths completely for now

        // Load the loader
        const loader = document.createElement('script');
        loader.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
        document.head.appendChild(loader);
    }
</script>
</body>
</html>
