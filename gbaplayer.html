<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0d1117; overflow: hidden; }
        #game-container { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rom = params.get('game');

        if (rom) {
            window.EJS_player = "#game-container";
            window.EJS_gameUrl = decodeURIComponent(rom);
            
            // This now points to your new local folder
            window.EJS_pathtodata = "emulatorjsdata/"; 
            
            window.EJS_core = rom.toLowerCase().includes('.gba') ? 'gba' : 'gbc';
        }
    </script>
    
    <script src="emulatorjsdata/loader.js"></script>
</body>
</html>
