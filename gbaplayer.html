<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rom = params.get('game');

        if (rom) {
            // Define these globally BEFORE loading the script
            window.EJS_player = "#game-container";
            window.EJS_gameUrl = decodeURIComponent(rom);
            
            // IMPORTANT: Check your sidebar! 
            // If your folder is still named "EmulatorJS-4.2.2", change this path to:
            // "/EmulatorJS-4.2.2/data/"
            window.EJS_pathtodata = "/data/"; 

            // Core detection
            const lowerRom = rom.toLowerCase();
            if (lowerRom.endsWith('.gba')) {
                window.EJS_core = 'gba';
            } else {
                window.EJS_core = 'gbc';
            }

            // Now manually inject the script to ensure it runs AFTER the variables are set
            const loader = document.createElement('script');
            loader.src = window.EJS_pathtodata + 'loader.js';
            document.head.appendChild(loader);

        } else {
            document.body.innerHTML = "<h1 style='color:white; font-family:sans-serif; padding-top:50px; text-align:center;'>No game selected.</h1>";
        }
    </script>
</body>
</html>
