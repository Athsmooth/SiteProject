<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Krecak HTML5 Player</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #090412; font-family: sans-serif; color: white; }
        #wrapper { display: flex; flex-direction: column; height: 100vh; }
        #nav { height: 60px; background: #11111b; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #333; }
        .back-btn { color: #00ffcc; text-decoration: none; border: 1px solid #00ffcc; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 13px; }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; background: #000; }
    </style>
</head>
<body>
    <div id="wrapper">
        <div id="nav">
            <a href="index.html" class="back-btn">← BACK TO GAMES</a>
            <span id="title" style="margin-left: 20px; opacity: 0.8; text-transform: uppercase;"></span>
        </div>
        <iframe id="game-frame" src="about:blank"></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gamePath = params.get('game');
        
        if (gamePath) {
            const decoded = decodeURIComponent(gamePath);
            document.getElementById('game-frame').src = decoded;
            document.getElementById('title').innerText = decoded.split('/').pop().replace('.html', '');
        } else {
            document.body.innerHTML = "<div style='padding:50px; text-align:center;'><h1>Error: No game specified.</h1><a href='index.html' style='color:#00ffcc;'>Return Home</a></div>";
        }
    </script>
</body>
</html>
