<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Player | Krecak Kreations</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Force the page to fill the entire browser window */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #000;
        }

        /* Navbar stays at the top */
        #nav {
            flex-shrink: 0; /* Don't let the navbar squash */
            z-index: 10;
        }

        /* This container clips the "extra" stuff outside the game borders */
        #game-wrapper {
            flex-grow: 1; /* Take up all remaining space */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* THIS FIXES THE 'SEEING OUTSIDE THE BORDER' ISSUE */
            background-color: #090412; /* Matches your dark theme */
        }

        /* The actual game frame */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* Keeps the game from stretching weirdly */
            object-fit: contain; 
        }
    </style>
</head>
<body>
    <nav id="nav">
        <a href="index.html" class="back-btn">← BACK</a>
        <span id="game-title" style="margin-left: 20px; font-weight: bold; color: #eee; text-transform: uppercase; font-family: sans-serif;"></span>
        <div style="flex-grow: 1;"></div>
    </nav>

    <div id="game-wrapper">
        <iframe id="game-frame" src="about:blank" allowfullscreen></iframe>
    </div>

    <script>
        // Get the game path from the URL (?game=path/to/game.html)
        const params = new URLSearchParams(window.location.search);
        const gamePath = params.get('game');
        
        if (gamePath) {
            const decodedPath = decodeURIComponent(gamePath);
            
            // Extract a clean name for the top bar
            const fileName = decodedPath.split('/').pop()
                .replace('.html', '')
                .replace(/[-_]/g, ' ');
            
            document.getElementById('game-title').innerText = fileName;

            // Load the game into the iframe
            document.getElementById('game-frame').src = decodedPath;
        } else {
            document.getElementById('game-title').innerText = "NO GAME SELECTED";
        }
    </script>
</body>
</html>
