<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML5 Player | Krecak Kreations</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Force body to fill the window */
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #000;
        }

        /* Navbar stays fixed at 60px */
        #nav {
            flex-shrink: 0;
        }

        /* Wrapper for the game to handle centering */
        #game-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #090412; /* Matches your theme */
            position: relative;
        }

        /* The actual game frame */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <nav id="nav">
        <a href="index.html" class="back-btn">← BACK</a>
        <span id="game-title" style="margin-left: 20px; font-weight: bold; color: #eee; text-transform: uppercase;"></span>
        <div style="flex-grow: 1;"></div>
        </nav>

    <div id="game-wrapper">
        <iframe id="game-frame" src="about:blank" allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gamePath = params.get('game');
        
        if (gamePath) {
            const decodedPath = decodeURIComponent(gamePath);
            
            // Clean up the title
            const fileName = decodedPath.split('/').pop().replace('.html', '').replace(/[-_]/g, ' ');
            document.getElementById('game-title').innerText = fileName;

            // Load the game into the iframe
            document.getElementById('game-frame').src = decodedPath;
        }
    </script>
</body>
</html>
