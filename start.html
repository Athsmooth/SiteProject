<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Student</title>
    <style>
        body { background: #111; color: white; display: flex; align-items: center; 
               justify-content: center; height: 100vh; font-family: sans-serif; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; 
                 background: #0066ff; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <button id="launchBtn">Open Library</button>

    <script>
        document.getElementById('launchBtn').onclick = function() {
            // 1. RECURSION CHECK
            // If this page is somehow inside an iframe, don't run.
            if (window.self !== window.top) return;

            const win = window.open("about:blank", "_blank");
            if (!win) return alert("Please allow popups!");

            // 2. BUILD THE PATH CAREFULLY
            // We get the current URL and replace ONLY the filename.
            // This works whether you are on a server or local.
            let path = window.location.pathname;
            let directory = path.substring(0, path.lastIndexOf('/'));
            let targetFile = directory + "/index.html";
            let finalUrl = window.location.origin + targetFile;

            // 3. CLOAK THE NEW TAB
            win.document.title = "Campus Student";
            
            // 4. INJECT THE IFRAME
            // We use a Template Literal to keep the code clean
            win.document.body.innerHTML = `
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
                    iframe { width: 100%; height: 100%; border: none; }
                </style>
                <iframe src="${finalUrl}"></iframe>
            `;

            // 5. SELF-DESTRUCT LAUNCHER
            // Delay slightly to ensure the new tab has "grabbed" the data
            setTimeout(() => {
                window.opener = null;
                window.close();
            }, 300);
        };
    </script>
</body>
</html>
