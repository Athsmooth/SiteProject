<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Student</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div>
        <h1>Campus Student</h1>
        <p>Connecting to Games Library...</p>
        <p style="opacity: 0.7;">Allow popups if nothing happens.</p>
    </div>

    <script>
        function openCloaked() {
            // True about:blank - NO URL
            const win = window.open();

            if (!win) {
                document.body.innerHTML = `
                    <div style="padding: 40px; text-align: center;">
                        <h1>Popup Blocked</h1>
                        <p>Please allow popups for this site, then refresh.</p>
                    </div>
                `;
                return;
            }

            // IMPORTANT: Load your REAL index.html here
            const iframe = win.document.createElement('iframe');
            iframe.style.cssText = "width:100vw; height:100vh; border:none; margin:0; padding:0; overflow:hidden;";
            iframe.src = "/index.html";     // ← Make sure this points to your real Games Library

            win.document.body.appendChild(iframe);
            win.document.body.style.cssText = "margin:0; padding:0; overflow:hidden;";

            // Auto close launcher tab
            setTimeout(() => {
                window.close();
            }, 1000);
        }

        // Auto trigger
        window.onload = () => {
            setTimeout(openCloaked, 800);
        };
    </script>
</body>
</html>
