<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Student</title>
    <style>
        body { margin:0; padding:0; background:#111; color:white; font-family:Arial,sans-serif; height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; }
    </style>
</head>
<body>
    <div>
        <h1>Campus Student</h1>
        <p>Opening cloaked tab...</p>
        <p style="opacity:0.7;">Allow popups if needed.</p>
    </div>

    <script>
        function openCloaked() {
            // Try the strongest blank method
            let win = window.open("about:blank", "_blank", "noopener,noreferrer");

            if (!win) {
                alert("Popup blocked. Allow popups and refresh.");
                return;
            }

            setTimeout(() => {
                try {
                    win.document.open();
                    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Campus Student</title></head><body style="margin:0;padding:0;overflow:hidden;">
                        <script src="/navigationinject.js"><\/script>
                        <main class="projects-placeholder">
                            <h2 class="section-header">Games Library</h2>
                            <div id="projects-placeholder" class="projects-grid">
                                <h2 style="color:white;text-align:center;width:100%;opacity:0.5;">Connecting to Library...</h2>
                            </div>
                        </main>
                        <script src="/navbar.js"><\/script>
                        <link rel="stylesheet" href="/style.css">
                        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
                    </body></html>`);
                    win.document.close();
                } catch(e) {
                    // Last resort fallback
                    win.location.href = "about:blank";
                    setTimeout(() => {
                        const iframe = win.document.createElement('iframe');
                        iframe.style.cssText = "width:100vw;height:100vh;border:none;";
                        iframe.src = "/index.html";
                        win.document.body.appendChild(iframe);
                    }, 100);
                }

                // Close launcher
                setTimeout(() => window.close(), 1200);
            }, 200);
        }

        window.onload = () => setTimeout(openCloaked, 800);
    </script>
</body>
</html>
