<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Student</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div>
        <h1>Campus Student</h1>
        <p>Opening Games Library in cloaked tab...</p>
        <p style="opacity: 0.7;">Allow popups if nothing happens.</p>
    </div>

    <script>
        function openCloaked() {
            // Open true about:blank
            const win = window.open("about:blank");

            if (!win) {
                document.body.innerHTML = `
                    <div style="padding:40px; text-align:center;">
                        <h1>Popup Blocked</h1>
                        <p>Please allow popups for this site, then refresh the page.</p>
                    </div>
                `;
                return;
            }

            // Wait a tiny bit then inject your real page
            setTimeout(() => {
                win.document.open();
                win.document.write(`
                    <!DOCTYPE html>
                    <html lang="en">
                    <head>
                        <meta charset="UTF-8">
                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <title>Campus Student</title>
                        <link rel="stylesheet" href="/style.css">
                        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
                        <link rel="icon" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                        <link rel="icon" type="image/png" href="/assets/favicons/favicon.png">
                    </head>
                    <body>
                        <script src="/navigationinject.js"><\/script>
                        <main class="projects-placeholder">
                            <h2 class="section-header">Games Library</h2>
                            <div id="projects-placeholder" class="projects-grid">
                                <h2 style="color: white; text-align: center; width: 100%; opacity: 0.5;">Connecting to Library...</h2>
                            </div>
                        </main>
                        <script src="/navbar.js"><\/script>
                    </body>
                    </html>
                `);
                win.document.close();

                // Auto close launcher tab
                setTimeout(() => window.close(), 800);
            }, 150);
        }

        // Auto trigger
        window.onload = () => setTimeout(openCloaked, 700);
    </script>
</body>
</html>
