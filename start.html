<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Student</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div>
        <h1>Campus Student</h1>
        <p>Connecting to Games Library...</p>
        <p style="opacity: 0.7;">Please allow popups if nothing happens.</p>
    </div>

    <script>
        function openCloaked() {
            // True about:blank — this is the key line
            const win = window.open();   

            if (!win) {
                document.body.innerHTML = `
                    <div style="padding:40px; text-align:center; color:#ffcc00;">
                        <h1>Popup Blocked</h1>
                        <p>Allow popups for this site, then refresh.</p>
                    </div>
                `;
                return;
            }

            const iframe = win.document.createElement('iframe');
            iframe.style.cssText = "width:100vw;height:100vh;border:none;margin:0;padding:0;overflow:hidden;";
            iframe.src = "/index.html";        // Your real main Games Library page

            win.document.body.appendChild(iframe);
            win.document.body.style.cssText = "margin:0;padding:0;overflow:hidden;";

            // Auto-close the launcher tab
            setTimeout(() => window.close(), 900);
        }

        // Auto-run
        window.onload = () => setTimeout(openCloaked, 700);
    </script>
</body>
</html>
