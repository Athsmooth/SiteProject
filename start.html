<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Student</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .launcher-card {
            background: #1d1d1d;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 { margin-top: 0; font-size: 28px; }
        p { color: #aaa; margin-bottom: 30px; }
        button {
            padding: 15px 45px;
            font-size: 18px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #0052cc; }
    </style>
</head>
<body>

    <div class="launcher-card">
        <h1>Campus Student</h1>
        <p>Loading your educational dashboard...</p>
        <button id="launchBtn">Open Dashboard</button>
    </div>

    <script>
        document.getElementById('launchBtn').onclick = function() {
            // 1. RECURSION GUARD
            // Prevents the script from running if it's already in the "LibraryWindow"
            if (window.name === "LibraryWindow" || window.self !== window.top) {
                return;
            }

            // 2. OPEN BLANK TAB WITH UNIQUE NAME
            const win = window.open("about:blank", "LibraryWindow");

            if (!win) {
                alert("Popup blocked! Please allow popups for this site to work.");
                return;
            }

            // 3. TARGET PATH LOGIC
            // We use window.location.origin to get the base URL (e.g., https://site.com)
            // We append /index.html and a timestamp (?v=) to bypass server redirects (302)
            const timestamp = new Date().getTime();
            const targetUrl = window.location.origin + "/index.html?v=" + timestamp;

            // 4. INJECT CLOAK
            win.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Campus Student</title>
                    <link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">
                    <style>
                        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #000; }
                        iframe { border: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
                    </style>
                </head>
                <body>
                    <iframe src="${targetUrl}"></iframe>
                </body>
                </html>
            `);
            win.document.close();

            // 5. SELF-DESTRUCT
            // Closes the launcher tab after the new tab is ready
            setTimeout(() => {
                window.stop();
                window.close();
            }, 400);
        };
    </script>
</body>
</html>
