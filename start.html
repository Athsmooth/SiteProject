<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Student</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div>
        <h1>Campus Student</h1>
        <p>Opening Games Library in cloaked tab...</p>
        <p style="opacity: 0.7;">Allow popups if nothing happens.</p>
    </div>

    <script>
        function openCloaked() {
            // Stronger way to create true about:blank
            const win = window.open("about:blank");

            if (!win) {
                document.body.innerHTML = `
                    <div style="padding:40px; text-align:center;">
                        <h1>Popup Blocked</h1>
                        <p>Please allow popups for this site, then refresh the page.</p>
                    </div>
                `;
                return;
            }

            // Small delay before writing the iframe (helps some browsers)
            setTimeout(() => {
                const iframe = win.document.createElement('iframe');
                iframe.style.cssText = "width:100vw;height:100vh;border:none;margin:0;padding:0;overflow:hidden;";
                iframe.src = "/index.html";

                win.document.body.appendChild(iframe);
                win.document.body.style.cssText = "margin:0;padding:0;overflow:hidden;";
            }, 100);

            // Auto close launcher tab
            setTimeout(() => {
                window.close();
            }, 1200);
        }

        // Auto trigger
        window.onload = () => {
            setTimeout(openCloaked, 800);
        };
    </script>
</body>
</html>
