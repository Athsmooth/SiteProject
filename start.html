<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Student</title>
    <style>
        body { margin: 0; background: #111; color: #333; display: flex; 
               align-items: center; justify-content: center; height: 100vh; }
        /* Hidden button or subtle link for "Secret Mode" */
        #secret-trigger {
            width: 10px; height: 10px; cursor: pointer; opacity: 0.1;
        }
    </style>
</head>
<body>
    <div id="secret-trigger">.</div>

    <script>
        document.getElementById('secret-trigger').onclick = async function() {
            try {
                // 1. Fetch your library
                const response = await fetch('./index.html');
                const text = await response.text();

                // 2. Open a window with NO URL (prevents Cloudflare from seeing it)
                const win = window.open("", "_blank");
                
                // 3. Manually inject the code
                // This bypasses every single redirect rule on Cloudflare
                win.document.open();
                win.document.write(text);
                win.document.close();

                // 4. Update the tab look
                win.document.title = "Campus Student";

            } catch (e) {
                console.error("Secret launch failed", e);
            }
        };
    </script>
</body>
</html>
