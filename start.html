<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Student</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        button {
            padding: 20px 50px;
            font-size: 23px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div>
        <h1>Campus Student</h1>
        <p>Click to open cloaked Games Library</p>
        <button onclick="openCloaked()">Open Library</button>
    </div>

    <script>
        function openCloaked() {
            // Open blank tab with extra flags to prevent redirect
            const win = window.open("about:blank", "_blank", "noopener,noreferrer");

            if (!win) {
                alert("Popup blocked. Allow popups then click again.");
                return;
            }

            setTimeout(() => {
                try {
                    win.document.open();
                    win.document.write(`
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Student</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/assets/favicons/favicon.png">
</head>
<body style="margin:0; padding:0; overflow:hidden;">
    <script src="/navigationinject.js"><\/script>
    <main class="projects-placeholder">
        <h2 class="section-header">Games Library</h2>
        <div id="projects-placeholder" class="projects-grid">
            <h2 style="color: white; text-align: center; width: 100%; opacity: 0.5;">Connecting to Library...</h2>
        </div>
    </main>
    <script src="/navbar.js"><\/script>
</body>
</html>
                    `);
                    win.document.close();
                } catch (e) {
                    // Fallback
                    win.location.replace("about:blank");
                }

                // Close launcher
                setTimeout(() => window.close(), 1200);
            }, 200);
        }
    </script>
</body>
</html>
