<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Student</title>
    <style>
        body { margin: 0; background: #111; color: #333; display: flex; 
               align-items: center; justify-content: center; height: 100vh; }
        /* Hidden button or subtle link for "Secret Mode" */
        #secret-trigger {
            width: 10px; height: 10px; cursor: pointer; opacity: 0.1;
        }
    </style>
</head>
<body>
    <div id="secret-trigger">.</div>

    <script>
        document.getElementById('launchBtn').onclick = async function() {
            // 1. Open the window first
            const win = window.open("about:blank", "_blank");
            if (!win) return alert("Popup blocked!");

            try {
                // 2. Fetch the library
                const response = await fetch('./index.html?v=' + Date.now());
                const html = await response.text();

                // 3. Create a temporary parser to turn the text into real HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // 4. Move everything from the fetched file into the new window
                // This is much more stable than document.write
                win.document.head.innerHTML = doc.head.innerHTML;
                win.document.body.innerHTML = doc.body.innerHTML;

                // 5. MANUALLY RE-INSERT SCRIPTS
                // Scripts inserted via innerHTML do not run. We must recreate them.
                Array.from(win.document.querySelectorAll("script")).forEach(oldScript => {
                    const newScript = win.document.createElement("script");
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(win.document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

                // 6. Close the launcher
                setTimeout(() => window.close(), 400);

            } catch (err) {
                win.document.body.innerHTML = "<h1>Failed to load: " + err.message + "</h1>";
            }
        };
        };
    </script>
</body>
</html>
