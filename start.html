<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Student</title>
    <style>
        body { background: #111; color: white; display: flex; align-items: center; 
               justify-content: center; height: 100vh; font-family: sans-serif; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; 
                 background: #0066ff; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <button id="launchBtn">Open Library</button>

    <script>
    function openCloaked() {
        // 1. Double-check we aren't already in an iframe
        if (window.self !== window.top) return;

        // 2. Open the tab
        const win = window.open("about:blank", "_blank");
        if (!win) {
            alert("Popup blocked! Click the icon in the URL bar to allow popups.");
            return;
        }

        // 3. Define the content of the new page
        // We use "index.html" without any slashes or origins. 
        // This tells the browser: "Look in the same folder I came from."
        const cloakHTML = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Campus Student</title>
                <link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">
                <style>
                    body, html { margin:0; padding:0; height:100vh; width:100vw; overflow:hidden; }
                    iframe { border:none; width:100%; height:100%; }
                </style>
            </head>
            <body>
                <iframe src="${window.location.origin}${window.location.pathname.replace('start.html', 'index.html')}"></iframe>
            </body>
            </html>
        `;

        // 4. Write to the new window
        win.document.open();
        win.document.write(cloakHTML);
        win.document.close();

        // 5. Close this launcher
        setTimeout(() => {
            window.stop(); // Stop any further execution on this page
            window.close();
        }, 400);
    }

    // Attach to button
    document.querySelector("button").onclick = openCloaked;
    </script>
</body>
</html>
