<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Student</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; 
               display: flex; align-items: center; justify-content: center; height: 100vh; }
        button { padding: 15px 35px; font-size: 18px; cursor: pointer; background: #0066ff; 
                 color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <button id="launchBtn">Open Dashboard</button>

    <script>
        document.getElementById('launchBtn').onclick = function() {
            // Open the index inside the subfolder
            // This ensures all relative JS and CSS files load perfectly
            const win = window.open('./main/index.html', '_blank');

            if (win) {
                // Optional: Close the launcher so it doesn't stay open
                setTimeout(() => { window.close(); }, 500);
            } else {
                alert("Please allow popups!");
            }
        };
    </script>
</body>
</html>
