<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERR 404</title> 
    <style>
        body { 
            margin: 0; 
            background: #ffffff;
            height: 100vh;
            cursor: default;
            touch-action: manipulation;
        }
    </style>
</head>
<body>

    <script>
        function launchDashboard() {
            const win = window.open('about:blank', '_blank');

            if (win) {
                const doc = win.document;
                doc.title = " "; 
                doc.body.style.margin = '0';
                doc.body.style.padding = '0';
                doc.body.style.overflow = 'hidden';
                
                // Using 'embed' instead of 'iframe'
                const view = doc.createElement('embed');
                view.style.border = 'none';
                view.style.width = '100vw';
                view.style.height = '100vh';
                // Using type="text/html" ensures it renders the page correctly
                view.setAttribute('type', 'text/html');
                view.src = window.location.origin + '/main/index.html';

                doc.body.appendChild(view);

                // Immediate redirect of the launcher page to stay stealthy
                window.location.replace('https://www.google.com'); 
            }
        }

        // --- DESKTOP: Alt + L ---
        document.addEventListener('keydown', function(e) {
            if (e.altKey && e.key.toLowerCase() === 'l') {
                e.preventDefault();
                launchDashboard();
            }
        });

        // --- MOBILE: Triple Tap ---
        let tapCount = 0;
        let lastTap = 0;

        document.addEventListener('touchend', function(e) {
            const currentTime = Date.now();
            const tapGap = currentTime - lastTap;

            if (tapGap > 500) {
                tapCount = 1;
            } else {
                tapCount++;
            }

            lastTap = currentTime;

            if (tapCount === 3) {
                tapCount = 0; 
                launchDashboard();
            }
        });
    </script>
</body>
</html>
