<!DOCTYPE html>
<html>
<head>
    <title>New Tab</title>
    <style>
        body { background-color: white; margin: 0; padding: 0; }
    </style>
</head>
<body>

    <script>
        const targetUrl = "https://krethan.pages.dev/main/index.html";
        const coverSite = "https://drive.google.com"; // The "innocent" site

        document.addEventListener('keydown', function(event) {
            if (event.altKey && event.code === 'KeyL') {
                event.preventDefault();
                launchAndCover();
            }
        });

        function launchAndCover() {
            var win = window.open();
            if (!win) {
                // If it fails, we don't redirect so you can try again
                alert("Pop-up blocked! Click once on the page then try Alt+L.");
                return;
            }

            // 1. Setup the cloaked window
            win.document.title = "about:blank";
            var obj = win.document.createElement('object');
            obj.style.width = "100%";
            obj.style.height = "100%";
            obj.style.position = "fixed";
            obj.style.top = "0";
            obj.style.left = "0";
            obj.style.border = "none";
            obj.data = targetUrl;

            win.document.body.style.margin = "0";
            win.document.body.style.overflow = "hidden";
            win.document.body.appendChild(obj);

            // 2. TRANSFORM THE LAUNCHER PAGE
            // This replaces the launcher with Google Drive immediately
            window.location.replace(coverSite);
        }
    </script>
</body>
</html>
