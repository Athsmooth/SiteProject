<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title> <style>
        body { 
            margin: 0; 
            background: #ffffff; /* Or #0d1117 if you prefer dark mode blankness */
            height: 100vh;
            cursor: default;
        }
    </style>
</head>
<body>

    <script>
        function launchDashboard() {
            const win = window.open('about:blank', '_blank');

            if (win) {
                const doc = win.document;
                doc.title = " "; 
                doc.body.style.margin = '0';
                doc.body.style.overflow = 'hidden';
                
                const iframe = doc.createElement('iframe');
                iframe.style.border = 'none';
                iframe.style.width = '100vw';
                iframe.style.height = '100vh';
                // Directs to your main folder
                iframe.src = window.location.origin + '/main/index.html';

                doc.body.appendChild(iframe);

                // Instantly hide this tab by going to a "safe" site
                window.location.replace('https://www.google.com'); 
            }
        }

        // Listen for Alt + J
        document.addEventListener('keydown', function(e) {
            if (e.altKey && e.key.toLowerCase() === 'l') {
                e.preventDefault();
                launchDashboard();
            }
        });
    </script>
</body>
</html>
