<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GB Player</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: white; font-family: sans-serif; 
            overflow: hidden; 
        }
        #game-wrapper { width: 100vw; height: 100vh; }
        #game { width: 100%; height: 100%; }
        
        .nav-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
        }
        .btn {
            background: rgba(40, 40, 40, 0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #444;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }
        .btn:hover { background: #007bff; border-color: #007bff; }
    </style>
</head>
<body>

    <div class="nav-overlay">
        <a href="index.html" class="btn">← Back to Library</a>
    </div>

    <div id="game-wrapper">
        <div id="game"></div>
    </div>

    <script>
        // 1. Get Game Data from URL
        const params = new URLSearchParams(window.location.search);
        let romPath = params.get('game'); 
        const type = params.get('type');

        if (!romPath) {
            alert("No ROM found!");
            window.location.href = "index.html";
        }

        // 2. Path Fixer (Forces the browser to look in /main/gb/)
        if (!romPath.startsWith('/') && !romPath.startsWith('http')) {
            romPath = '/main/' + romPath;
        }

        // 3. Emulator Settings
        window.EJS_player = "#game";
        window.EJS_gameUrl = romPath; 
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        window.EJS_startOnLoaded = true;

        // 4. Accuracy-focused Core Selection
        // mGBA is the most accurate for GBA
        // Gambatte is the most accurate for GB/GBC
        window.EJS_core = (type === 'gba') ? 'mgba' : 'gambatte';

        // 5. Fire it up
        const loader = document.createElement('script');
        loader.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
        document.head.appendChild(loader);
    </script>
</body>
</html>
