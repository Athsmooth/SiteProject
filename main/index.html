<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Page...</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/favicons/favicon.png">
</head>
<body>

    <div id="navbar-container"></div>

    <main class="projects-placeholder">
        <h2 class="section-header">Games Library</h2>
        <div id="projects-placeholder" class="projects-grid">
            <h2 style="color: white; text-align: center; width: 100%; opacity: 0.5;">Connecting to Library...</h2>
        </div>
    </main>

    <script src="navigationinject.js"></script>
    <script src="navbar.js"></script>
    <script>
        // Newsletter / Status Update Logic
        window.addEventListener('load', () => {
            // Use sessionStorage so they only see the "newsletter" once per browser session
            if (!sessionStorage.getItem('statusRead')) {
                
                // Wait for the navbar/toast container to be ready
                const checkSystem = setInterval(() => {
                    if (typeof showToast === "function" && document.getElementById('toast-container')) {
                        clearInterval(checkSystem);

                        setTimeout(() => {
                            showToast("Site version 3.2 ATTENTION: OLD VERSION OF COOKIE CLICKER WILL BE REMOVED! TRANSFER YOUR SAVE!!!");
                        }, 1000);

                        sessionStorage.setItem('statusRead', 'true');
                    }
                }, 100);
            }
        });
    </script>
</body>
</html>
