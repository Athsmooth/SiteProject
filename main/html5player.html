<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krethan's Games</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://krethan.pages.dev/assets/favicons/favicon.png">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #000;
        }

        /* The script handles the #nav positioning. 
           We just ensure the container exists.
        */
        #navbar-container {
            width: 100%;
            z-index: 10000; /* Stay on top of everything */
        }

        #game-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #090412;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Float the game title over the game or inside the injected nav if desired */
        #game-title-overlay {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.3);
            font-family: sans-serif;
            font-size: 12px;
            pointer-events: none; /* User can click through it */
            z-index: 5;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="navbar-container"></div>

    <div id="game-title-overlay"></div>

    <div id="game-wrapper">
        <iframe id="game-frame" src="about:blank" allowfullscreen></iframe>
    </div>

    <script src="navigationinject.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gamePath = params.get('game');
        
        if (gamePath) {
            const decodedPath = decodeURIComponent(gamePath);
            const fileName = decodedPath.split('/').pop()
                .replace('.html', '')
                .replace(/[-_]/g, ' ');
            
            // Set the overlay title
            document.getElementById('game-title-overlay').innerText = fileName;
            // Load game
            document.getElementById('game-frame').src = decodedPath;
        } else {
            document.getElementById('game-title-overlay').innerText = "NO GAME SELECTED";
        }
    </script>
</body>
</html>
