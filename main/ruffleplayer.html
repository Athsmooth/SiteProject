<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Student</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
    <link rel="icon" type="image/png" href="https://krethan.pages.dev/assets/favicons/favicon.png">
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #000; /* Pure black background */
        }

        #nav {
            flex-shrink: 0;
            z-index: 10;
        }

        #ruffle-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Clips anything outside the game stage */
            background-color: #050505; 
        }

        /* This is the magic part for Ruffle */
        ruffle-player {
            width: 100%;
            height: 100%;
            /* 'contain' ensures the game keeps its original shape 
               without showing the hidden 'spawning' areas */
            object-fit: contain; 
        }
    </style>
</head>
<body>
    <script src="https://krethan.pages.dev/navigationinject.js"></script>
    <div id="navbar-container"></div>

    <div id="ruffle-container"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gamePath = params.get('game');
        
        if (gamePath) {
            const decodedPath = decodeURIComponent(gamePath);
            const fileName = decodedPath.split('/').pop().replace('.swf', '').replace(/[-_]/g, ' ');
            document.getElementById('game-title').innerText = fileName;

            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            
            // RUFFLE CONFIG: This tells the player to respect the stage boundaries
            player.config = {
                letterbox: "on",
                forceScale: true,
                forceAlign: true
            };

            document.getElementById("ruffle-container").appendChild(player);
            player.load(decodedPath);
        }
    </script>
</body>
</html>
