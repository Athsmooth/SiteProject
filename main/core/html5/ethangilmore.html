<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,    initial-scale=1.0">
    <title>Ethan Gilmore Tycoon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family:    'Inter',    sans-serif; }
        canvas { touch-action:    none; }
        .scrollbar-hide::-webkit-scrollbar { display:    none; }
        .scrollbar-hide { -ms-overflow-style:    none; scrollbar-width:    none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

    <div class="max-w-6xl mx-auto p-4 md:   p-8">
        
        <!-- Header -->
        <header class="flex flex-col md:   flex-row items-center justify-between mb-6 gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-green-600 p-3 rounded-xl shadow-lg">
                    <i data-lucide="golf" class="w-8 h-8 text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">Ethan Gilmore Tycoon</h1>
                    <p class="text-sm text-slate-500">Build your golf empire!</p>
                </div>
            </div>
            
            <!-- Stats Bar -->
            <div class="flex gap-4 w-full md:   w-auto">
                <div class="flex-1 md:   flex-none bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200 flex items-center gap-2">
                    <i data-lucide="circle-dot" class="w-5 h-5 text-green-600"></i>
                    <div>
                        <div class="text-xs text-slate-500 font-medium">Golf Balls</div>
                        <div class="text-lg font-bold" id="display-money">0</div>
                    </div>
                </div>
                <div class="flex-1 md:   flex-none bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200 flex items-center gap-2">
                    <i data-lucide="trophy" class="w-5 h-5 text-amber-500"></i>
                    <div>
                        <div class="text-xs text-slate-500 font-medium">Holes</div>
                        <div class="text-lg font-bold" id="display-holes">0</div>
                    </div>
                </div>
                <div class="flex-1 md:   flex-none bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200 flex items-center gap-2">
                    <i data-lucide="zap" class="w-5 h-5 text-blue-500"></i>
                    <div>
                        <div class="text-xs text-slate-500 font-medium">Per Sec</div>
                        <div class="text-lg font-bold" id="display-mps">0</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:   grid-cols-12 gap-6">
            
            <!-- Left Column:    Game Area -->
            <div class="lg:   col-span-5 flex flex-col gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-lg border border-slate-200">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-lg flex items-center gap-2">
                            <i data-lucide="target" class="w-5 h-5 text-green-600"></i>
                            The Course
                        </h2>
                        <span class="text-sm bg-green-100 text-green-700 px-2 py-1 rounded-md font-medium" id="balls-per-hole-display">
                            1 ball/hole
                        </span>
                    </div>
                    
                    <div class="relative flex justify-center bg-slate-900 rounded-xl overflow-hidden shadow-inner">
                        <canvas id="gameCanvas" width="320" height="480" class="cursor-pointer max-w-full"></canvas>
                        
                        <!-- Floating Text Container -->
                        <div id="floating-text-container" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
                    </div>

                    <div class="mt-4 text-center text-sm text-slate-500">
                        <i data-lucide="mouse-pointer-2" class="w-4 h-4 inline mr-1"></i>
                        Drag on a ball to aim and shoot!
                    </div>
                </div>

                <!-- Active AI Balls Preview -->
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-sm mb-3 flex items-center gap-2">
                        <i data-lucide="cpu" class="w-4 h-4 text-blue-600"></i>
                        AI Golf Balls
                    </h3>
                    <div id="ai-balls-preview" class="flex gap-2 overflow-x-auto scrollbar-hide pb-2">
                        <!-- AI balls avatars injected here -->
                        <div class="text-sm text-slate-400 italic">No AI balls yet...</div>
                    </div>
                </div>
            </div>

            <!-- Right Column:    Controls -->
            <div class="lg:   col-span-7">
                <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden h-full flex flex-col">
                    
                    <!-- Tabs -->
                    <div class="flex border-b border-slate-200">
                        <button onclick="switchTab('shop')" id="tab-shop" class="flex-1 py-4 text-sm font-semibold text-green-600 border-b-2 border-green-600 bg-green-50 transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="shopping-cart" class="w-4 h-4"></i> Pro Shop
                        </button>
                        <button onclick="switchTab('ai')" id="tab-ai" class="flex-1 py-4 text-sm font-semibold text-slate-500 hover:   text-slate-700 transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="cpu" class="w-4 h-4"></i> AI Upgrades
                        </button>
                        <button onclick="switchTab('achievements')" id="tab-achievements" class="flex-1 py-4 text-sm font-semibold text-slate-500 hover:   text-slate-700 transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="award" class="w-4 h-4"></i> Achievements
                        </button>
                    </div>

                    <!-- Tab Content -->
                    <div class="flex-1 overflow-y-auto p-4 bg-slate-50 relative min-h-[500px]">
                        
                        <!-- Shop Panel -->
                        <div id="panel-shop" class="space-y-3">
                            <!-- Shop items injected via JS -->
                        </div>

                        <!-- AI Panel -->
                        <div id="panel-ai" class="hidden space-y-4">
                            <div class="bg-blue-600 text-white p-4 rounded-xl flex items-center justify-between shadow-md">
                                <div>
                                    <div class="font-bold">AI Golf Ball</div>
                                    <div class="text-blue-100 text-sm">Automatically shoots balls</div>
                                </div>
                                <button id="btn-buy-ai-ball" class="bg-white text-blue-700 px-4 py-2 rounded-lg font-bold hover:   bg-blue-50 transition-colors disabled:   opacity-50 disabled:   cursor-not-allowed">
                                    50 Balls
                                </button>
                            </div>
                            <div id="ai-upgrades-list" class="space-y-3">
                                <!-- AI upgrades injected here -->
                            </div>
                        </div>

                        <!-- Achievements Panel -->
                        <div id="panel-achievements" class="hidden space-y-3">
                            <!-- Achievements injected here -->
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 z-50">
        <span id="toast-icon">🏆</span>
        <span id="toast-message" class="font-medium">Achievement Unlocked!</span>
    </div>

    <script>
        // --- Game State ---
        const state = {
            money:    0,    
            holes:    0,    
            balls:    [],    
            hole:    { x:    160,    y:    60,    radius:    18 },    
            hazards:    [],    
            upgrades:    [
                { id:    'iron',    name:    'Iron Club',    desc:    '+1 ball per hole',    cost:    5,    owned:    0,    value:    1,    type:    'click' },    
                { id:    'wood',    name:    'Wood Club',    desc:    '+5 balls per hole',    cost:    25,    owned:    0,    value:    5,    type:    'click' },    
                { id:    'driver',    name:    'Titanium Driver',    desc:    '+25 balls per hole',    cost:    100,    owned:    0,    value:    25,    type:    'click' },    
                { id:    'gold_ball',    name:    'Golden Ball',    desc:    'OP! +50 balls per hole',    cost:    250,    owned:    0,    value:    50,    type:    'click',    special:    true },    
                { id:    'cart',    name:    'Golf Cart',    desc:    '+5 balls/sec',    cost:    100,    owned:    0,    value:    5,    type:    'idle' },    
                { id:    'pro',    name:    'Golf Pro',    desc:    '+25 balls/sec',    cost:    500,    owned:    0,    value:    25,    type:    'idle' },    
                { id:    'resort',    name:    'Luxury Resort',    desc:    '+100 balls/sec',    cost:    2000,    owned:    0,    value:    100,    type:    'idle' }
            ],    
            aiUpgrades:    [
                { id:    'ai_speed',    name:    'AI Speed Boost',    desc:    'Increase AI shooting speed',    cost:    50,    owned:    0,    value:    0.8,    type:    'ai_speed' },   
                { id:    'ai_accuracy',    name:    'AI Accuracy Boost',    desc:    'Improve AI aiming precision',    cost:    75,    owned:    0,    value:    0.8,    type:    'ai_accuracy' }
            ], 
            achievements:    [
                { id:    'novice',    name:    'Novice Golfer',    desc:    'Complete 10 holes',    goal:    10,    type:    'holes',    achieved:    false },    
                { id:    'pro',    name:    'Club Pro',    desc:    'Complete 50 holes',    goal:    50,    type:    'holes',    achieved:    false },    
                { id:    'rich',    name:    'Collector',    desc:    'Collect 1,   000 balls',    goal:    1000,    type:    'money',    achieved:    false },    
                { id:    'tycoon',    name:    'Golf Tycoon',    desc:    'Collect 100,   000 balls',    goal:    100000,    type:    'money',    achieved:    false },    
            ],   
            aiSettings:    {
                speed:    3000,    // milliseconds between shots
                accuracy:    0.3  // inaccuracy factor (lower is more accurate)
            }
        };

        // --- Canvas Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let isDragging = false;
        let dragStart = null;
        let dragCurrent = null;
        let selectedBallIndex = 0; // Only player ball (index 0) is selectable

        // --- Initialization ---
        function init() {
            // Add initial player ball
            addBall(false); // false = player controlled
            generateHazards();
            renderShop();
            renderAIUpgrades();
            renderAchievements();
            updateUI();
            
            // Start loops
            requestAnimationFrame(gameLoop);
            setInterval(idleLoop,    100); // 10 times a second for smooth income
            setInterval(aiLoop,    500); // AI checks every 500ms
            lucide.createIcons();
        }

        function addBall(isAIControlled = true) {
            const ball = {
                x:    160,    
                y:    400,    
                vx:    0,    
                vy:    0,    
                radius:    8,    
                color:    isAIControlled ? '#3b82f6' :  'white',  // Blue for AI,  white for player
                isAI:    isAIControlled
            };
            
            state.balls.push(ball);
        }

        function generateHazards() {
            state.hazards = [];
            // Sand traps
            for(let i=0; i<3; i++) {
                state.hazards.push({
                    type:    'sand',    
                    x:    20 + Math.random() * 240,    
                    y:    100 + Math.random() * 200,    
                    w:    40 + Math.random() * 40,    
                    h:    30 + Math.random() * 30
                });
            }
            // Water
            state.hazards.push({
                type:    'water',    
                x:    40 + Math.random() * 200,    
                y:    200 + Math.random() * 100,    
                w:    60,    
                h:    20
            });
            // Pegs
            for(let i=0; i<4; i++) {
                state.hazards.push({
                    type:    'peg',    
                    x:    30 + Math.random() * 260,    
                    y:    120 + Math.random() * 200,    
                    r:    6
                });
            }
        }

        // --- Physics Engine ---
        function updatePhysics() {
            let allStopped = true;

            state.balls.forEach((ball,    index) => {
                if (Math.abs(ball.vx) > 0.1 || Math.abs(ball.vy) > 0.1) {
                    allStopped = false;
                    
                    // Move
                    ball.x += ball.vx;
                    ball.y += ball.vy;

                    // Friction
                    ball.vx *= 0.985;
                    ball.vy *= 0.985;

                    // Wall Collisions
                    if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx *= -0.7; }
                    if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.vx *= -0.7; }
                    if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy *= -0.7; }
                    if (ball.y + ball.radius > canvas.height) { ball.y = canvas.height - ball.radius; ball.vy *= -0.7; }

                    // Hazard Collisions
                    state.hazards.forEach(h => {
                        if (h.type === 'sand') {
                            if (ball.x > h.x && ball.x < h.x + h.w && ball.y > h.y && ball.y < h.y + h.h) {
                                ball.vx *= 0.9;
                                ball.vy *= 0.9;
                            }
                        } else if (h.type === 'water') {
                            if (ball.x > h.x && ball.x < h.x + h.w && ball.y > h.y && ball.y < h.y + h.h) {
                                resetBall(ball);
                            }
                        } else if (h.type === 'peg') {
                            const dx = ball.x - h.x;
                            const dy = ball.y - h.y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            if (dist < ball.radius + h.r) {
                                const angle = Math.atan2(dy,    dx);
                                ball.x = h.x + Math.cos(angle) * (ball.radius + h.r);
                                ball.y = h.y + Math.sin(angle) * (ball.radius + h.r);
                                const nx = Math.cos(angle);
                                const ny = Math.sin(angle);
                                const dot = ball.vx * nx + ball.vy * ny;
                                ball.vx = (ball.vx - 2 * dot * nx) * 0.8;
                                ball.vy = (ball.vy - 2 * dot * ny) * 0.8;
                            }
                        }
                    });

                    // Hole Check
                    const dx = ball.x - state.hole.x;
                    const dy = ball.y - state.hole.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < state.hole.radius && Math.abs(ball.vx) < 8 && Math.abs(ball.vy) < 8) {
                        completeHole();
                        resetBall(ball);
                    }
                } else {
                    ball.vx = 0;
                    ball.vy = 0;
                }
            });
        }

        function resetBall(ball) {
            ball.x = 40 + Math.random() * (canvas.width - 80);
            ball.y = canvas.height - 40;
            ball.vx = 0;
            ball.vy = 0;
        }

        function completeHole() {
            const power = getClickPower();
            state.money += power;
            state.holes++;
            state.hole = { x:    40 + Math.random() * (canvas.width - 80),    y:    40 + Math.random() * 60,    radius:    18 };
            generateHazards();
            showFloatingText(`+${formatNumber(power)}`,    state.hole.x,    state.hole.y,    '#22c55e');
            checkAchievements();
            updateUI();
        }

        // --- Rendering ---
        function draw() {
            // Background (Grass)
            ctx.fillStyle = '#22c55e';
            ctx.fillRect(0,    0,    canvas.width,    canvas.height);

            // Hazards
            state.hazards.forEach(h => {
                if (h.type === 'sand') {
                    ctx.fillStyle = '#fde047';
                    ctx.fillRect(h.x,    h.y,    h.w,    h.h);
                } else if (h.type === 'water') {
                    ctx.fillStyle = '#3b82f6';
                    ctx.fillRect(h.x,    h.y,    h.w,    h.h);
                } else if (h.type === 'peg') {
                    ctx.fillStyle = '#dc2626';
                    ctx.beginPath();
                    ctx.arc(h.x,    h.y,    h.r,    0,    Math.PI * 2);
                    ctx.fill();
                }
            });

            // Hole
            ctx.fillStyle = '#1f2937';
            ctx.beginPath();
            ctx.arc(state.hole.x,    state.hole.y,    state.hole.radius,    0,    Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#374151';
            ctx.beginPath();
            ctx.arc(state.hole.x,    state.hole.y,    state.hole.radius - 3,    0,    Math.PI * 2);
            ctx.fill();

            // Balls
            state.balls.forEach((ball,    i) => {
                ctx.fillStyle = ball.color;
                ctx.beginPath();
                ctx.arc(ball.x,    ball.y,    ball.radius,    0,    Math.PI * 2);
                ctx.fill();
                // Outline
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Highlight if selected (only player ball)
                if (i === 0 && isDragging) {
                    ctx.strokeStyle = '#fbbf24';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            });

            // Drag Line (only for player ball)
            if (isDragging && dragStart && dragCurrent) {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.setLineDash([5,    5]);
                ctx.beginPath();
                ctx.moveTo(dragStart.x,    dragStart.y);
                ctx.lineTo(dragCurrent.x,    dragCurrent.y);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // --- Input Handling ---
        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x:    (evt.clientX - rect.left) * scaleX,    
                y:    (evt.clientY - rect.top) * scaleY
            };
        }

        canvas.addEventListener('mousedown',    (e) => {
            const pos = getMousePos(e);
            // Only allow dragging on player ball (index 0)
            if (state.balls.length > 0) {
                const ball = state.balls[0];
                const dx = pos.x - ball.x;
                const dy = pos.y - ball.y;
                if (Math.sqrt(dx*dx + dy*dy) < ball.radius + 15) {
                    isDragging = true;
                    dragStart = { x:    ball.x,    y:    ball.y };
                    dragCurrent = pos;
                    selectedBallIndex = 0;
                }
            }
        });

        canvas.addEventListener('mousemove',    (e) => {
            if (isDragging) {
                dragCurrent = getMousePos(e);
            }
        });

        window.addEventListener('mouseup',    () => {
            if (isDragging && dragStart && dragCurrent) {
                const dx = dragStart.x - dragCurrent.x;
                const dy = dragStart.y - dragCurrent.y;
                const power = Math.min(Math.sqrt(dx*dx + dy*dy) * 0.15,    15);
                
                if (power > 0.5 && selectedBallIndex === 0) {
                    const angle = Math.atan2(dy,    dx);
                    state.balls[0].vx = Math.cos(angle) * power;
                    state.balls[0].vy = Math.sin(angle) * power;
                }
            }
            isDragging = false;
            dragStart = null;
            dragCurrent = null;
            selectedBallIndex = 0;
        });

        // --- Tycoon Logic ---
        function getClickPower() {
            return 1 + state.upgrades.reduce((sum,    u) => u.type === 'click' ? sum + (u.value * u.owned) :    sum,    0);
        }

        function getIdleIncome() {
            return state.upgrades.reduce((sum,    u) => u.type === 'idle' ? sum + (u.value * u.owned) :    sum,    0);
        }

        function idleLoop() {
            const income = getIdleIncome();
            if (income > 0) {
                state.money += income / 10;
                checkAchievements();
                updateUI();
            }
        }

        // --- AI Logic ---
        function aiLoop() {
            // Only run if we have AI balls (beyond the player ball)
            if (state.balls.length <= 1) return;
            
            // Control shooting frequency based on AI speed setting
            if (Math.random() > (state.aiSettings.speed / 5000)) {
                // Find an AI ball (skip player ball at index 0)
                const aiBalls = state.balls.slice(1).filter(ball => ball.isAI);
                if (aiBalls.length > 0) {
                    const ball = aiBalls[Math.floor(Math.random() * aiBalls.length)];
                    if (Math.abs(ball.vx) < 0.5 && Math.abs(ball.vy) < 0.5) {
                        const dx = state.hole.x - ball.x;
                        const dy = state.hole.y - ball.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        const power = Math.min(dist * 0.04,    12); // Auto aim power
                        
                        // Add inaccuracy based on AI accuracy setting
                        const inaccuracy = state.aiSettings.accuracy;
                        const angle = Math.atan2(dy,    dx) + (Math.random() - 0.5) * inaccuracy;
                        
                        ball.vx = Math.cos(angle) * power;
                        ball.vy = Math.sin(angle) * power;
                    }
                }
            }
        }

        // --- UI Logic ---
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return Math.floor(num);
        }

        function updateUI() {
            document.getElementById('display-money').textContent = formatNumber(state.money);
            document.getElementById('display-holes').textContent = state.holes;
            document.getElementById('display-mps').textContent = formatNumber(getIdleIncome());
            document.getElementById('balls-per-hole-display').textContent = `${getClickPower()} balls/hole`;
            
            // Update buttons state
            renderShop(); // Re-render to update disabled states
            renderAIUpgrades();
            renderAIBallsPreview();
        }

        function switchTab(tabName) {
            ['shop',    'ai',    'achievements'].forEach(t => {
                document.getElementById(`tab-${t}`).className = t === tabName 
                    ? "flex-1 py-4 text-sm font-semibold text-green-600 border-b-2 border-green-600 bg-green-50 transition-colors flex items-center justify-center gap-2"
                    :    "flex-1 py-4 text-sm font-semibold text-slate-500 hover:   text-slate-700 transition-colors flex items-center justify-center gap-2";
                document.getElementById(`panel-${t}`).classList.toggle('hidden',    t !== tabName);
            });
        }

        function renderShop() {
            const container = document.getElementById('panel-shop');
            container.innerHTML = '';
            
            state.upgrades.forEach(u => {
                const canAfford = state.money >= u.cost;
                const div = document.createElement('div');
                div.className = `p-3 rounded-xl border-2 transition-all ${u.special ? 'bg-amber-50 border-amber-200' :    'bg-white border-slate-200'} ${canAfford ? 'hover:   border-green-400' :    'opacity-75'}`;
                
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <div class="font-bold text-sm">${u.name}</div>
                            <div class="text-xs text-slate-500">${u.desc}</div>
                        </div>
                        <div class="bg-slate-100 px-2 py-1 rounded text-xs font-bold">${u.owned}</div>
                    </div>
                    <button onclick="buyUpgrade('${u.id}')" ${!canAfford ? 'disabled' :    ''} 
                        class="w-full py-2 rounded-lg text-sm font-bold transition-colors ${canAfford 
                            ? (u.special ? 'bg-amber-500 hover:   bg-amber-600 text-white' :    'bg-green-600 hover:   bg-green-700 text-white') 
                            :    'bg-slate-200 text-slate-400 cursor-not-allowed'}">
                        ${formatNumber(u.cost)} Balls
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function buyUpgrade(id) {
            const upgrade = state.upgrades.find(u => u.id === id);
            if (upgrade && state.money >= upgrade.cost) {
                state.money -= upgrade.cost;
                upgrade.owned++;
                upgrade.cost = Math.floor(upgrade.cost * 1.5); // Increase cost
                
                updateUI();
                showToast(`Bought ${upgrade.name}!`,    '🛒');
            }
        }

        function renderAIUpgrades() {
            // Update Buy AI Ball Button
            const btn = document.getElementById('btn-buy-ai-ball');
            btn.textContent = `${formatNumber(50)} Balls`;
            btn.disabled = state.money < 50;
            btn.onclick = () => {
                if (state.money >= 50) {
                    state.money -= 50;
                    addBall(true); // Add AI controlled ball
                    updateUI();
                    showToast('AI Ball Bought!',    '🔵');
                }
            };

            // Render AI Upgrades List
            const list = document.getElementById('ai-upgrades-list');
            list.innerHTML = '';
            
            state.aiUpgrades.forEach(u => {
                const canAfford = state.money >= u.cost;
                const div = document.createElement('div');
                div.className = `p-3 rounded-xl border-2 transition-all bg-white border-slate-200 ${canAfford ? 'hover:   border-blue-400' :    'opacity-75'}`;
                
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <div class="font-bold text-sm">${u.name}</div>
                            <div class="text-xs text-slate-500">${u.desc}</div>
                        </div>
                        <div class="bg-slate-100 px-2 py-1 rounded text-xs font-bold">${u.owned}</div>
                    </div>
                    <button onclick="buyAIUpgrade('${u.id}')" ${!canAfford ? 'disabled' :    ''} 
                        class="w-full py-2 rounded-lg text-sm font-bold transition-colors ${canAfford 
                            ? 'bg-blue-600 hover:   bg-blue-700 text-white' 
                            :    'bg-slate-200 text-slate-400 cursor-not-allowed'}">
                        ${formatNumber(u.cost)} Balls
                    </button>
                `;
                list.appendChild(div);
            });
        }

        function buyAIUpgrade(id) {
            const upgrade = state.aiUpgrades.find(u => u.id === id);
            if (upgrade && state.money >= upgrade.cost) {
                state.money -= upgrade.cost;
                upgrade.owned++;
                upgrade.cost = Math.floor(upgrade.cost * 1.5); // Increase cost
                
                // Apply AI upgrades
                if (upgrade.type === 'ai_speed') {
                    state.aiSettings.speed = Math.max(500,    state.aiSettings.speed * upgrade.value); // Faster shooting
                } else if (upgrade.type === 'ai_accuracy') {
                    state.aiSettings.accuracy = Math.max(0.05,    state.aiSettings.accuracy * upgrade.value); // More accurate
                }
                
                updateUI();
                showToast(`Bought ${upgrade.name}!`,    '⚙️');
            }
        }

        function renderAIBallsPreview() {
            const preview = document.getElementById('ai-balls-preview');
            const aiBalls = state.balls.slice(1); // Skip player ball
            
            if (aiBalls.length > 0) {
                preview.innerHTML = aiBalls.map((ball,  index) => `
                    <div class="flex-shrink-0 w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-xs border-2 border-white shadow-sm" title="AI Ball ${index + 1}">
                        ${index + 1}
                    </div>
                `).join('');
            } else {
                preview.innerHTML = '<div class="text-sm text-slate-400 italic">No AI balls yet...</div>';
            }
        }

        function renderAchievements() {
            const container = document.getElementById('panel-achievements');
            container.innerHTML = '';
            
            state.achievements.forEach(a => {
                const current = a.type === 'money' ? state.money :    state.holes;
                const progress = Math.min((current / a.goal) * 100,    100);
                const achieved = current >= a.goal;
                
                const div = document.createElement('div');
                div.className = `p-3 rounded-xl border-2 ${achieved ? 'bg-yellow-50 border-yellow-400' :    'bg-white border-slate-200'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <div class="font-bold text-sm ${achieved ? 'text-yellow-700' :    ''}">${a.name}</div>
                        ${achieved ? '<i data-lucide="check-circle" class="w-4 h-4 text-yellow-600"></i>' :    '<i data-lucide="lock" class="w-4 h-4 text-slate-400"></i>'}
                    </div>
                    <div class="text-xs text-slate-500 mb-2">${a.desc}</div>
                    <div class="w-full bg-slate-200 rounded-full h-2">
                        <div class="h-2 rounded-full ${achieved ? 'bg-yellow-500' :    'bg-green-500'}" style="width:    ${progress}%"></div>
                    </div>
                    <div class="text-xs text-slate-400 mt-1 text-right">${formatNumber(current)} / ${formatNumber(a.goal)}</div>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function checkAchievements() {
            let changed = false;
            state.achievements.forEach(a => {
                const current = a.type === 'money' ? state.money :    state.holes;
                if (!a.achieved && current >= a.goal) {
                    a.achieved = true;
                    changed = true;
                    showToast(`Achievement:    ${a.name}`,    '🏆');
                }
            });
            if (changed) renderAchievements();
        }

        // --- Visual Effects ---
        function showFloatingText(text,    x,    y,    color) {
            const container = document.getElementById('floating-text-container');
            const el = document.createElement('div');
            el.textContent = text;
            el.className = 'absolute font-bold text-lg pointer-events-none transition-all duration-1000 ease-out';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = color;
            el.style.textShadow = '0 1px 2px rgba(0,    0,    0,    0.5)';
            container.appendChild(el);

            // Animate
            requestAnimationFrame(() => {
                el.style.transform = 'translateY(-50px)';
                el.style.opacity = '0';
            });

            setTimeout(() => el.remove(),    1000);
        }

        function showToast(message,    icon) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            document.getElementById('toast-icon').textContent = icon;
            
            toast.classList.remove('translate-y-20',    'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20',    'opacity-0');
            },    2500);
        }

        // --- Start Game ---
        init();

    </script>
</body>
</html>
