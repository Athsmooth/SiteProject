<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game-wrapper { width: 100vw; height: 100vh; }
        #game { width: 100%; height: 100%; }
        .nav { position: absolute; top: 10px; left: 10px; z-index: 100; }
        .btn { 
            background: rgba(30, 30, 30, 0.8); color: white; padding: 8px 15px; 
            text-decoration: none; border-radius: 5px; font-family: sans-serif;
            border: 1px solid #444; backdrop-filter: blur(4px);
        }
        .btn:hover { background: #007bff; }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html" class="btn">← Back</a>
    </div>

    <div id="game-wrapper">
        <div id="game"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const romPath = params.get('game'); 
        const type = params.get('type');

        if (romPath) {
            window.EJS_player = "#game";
            window.EJS_gameUrl = romPath; // Points to gb/filename.gb
            window.EJS_core = (type === 'gba') ? 'mgba' : 'gambatte';
            window.EJS_startOnLoaded = true;
            window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

            const loader = document.createElement('script');
            loader.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            document.head.appendChild(loader);
        }
    </script>
</body>
</html>
