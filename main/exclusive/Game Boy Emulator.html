<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .upload-box { border: 2px dashed #444; padding: 40px; border-radius: 15px; background: #1e1e1e; }
        .btn { background: #007bff; color: white; padding: 15px 30px; border-radius: 8px; cursor: pointer; display: inline-block; margin-top: 20px; font-weight: bold; }
        input[type="file"] { display: none; }
        #game-wrapper { width: 100vw; height: 100vh; display: none; background: #000; position: absolute; top: 0; left: 0; }
        #game { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="setup" class="container">
        <div class="upload-box">
            <h1>Retro Player</h1>
            <p>Select your <b>.gbc</b> or <b>.gba</b> file to start. If you don't have any, you can search for *legal* ROM packs online.</p>
            <label for="rom-upload" class="btn">Choose Game File</label>
            <input type="file" id="rom-upload" accept=".gb, .gbc, .gba">
        </div>
    </div>

    <div id="game-wrapper">
        <div id="game"></div>
    </div>

    <script>
        const fileInput = document.getElementById('rom-upload');
        
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-wrapper').style.display = 'block';

            const romUrl = URL.createObjectURL(file);

            // Settings must be global window variables
            window.EJS_player = "#game";
            window.EJS_gameUrl = romUrl; 
            window.EJS_startOnLoaded = true;
            
            // FIX: Trailing slash is REQUIRED after /data/
            window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            
            const ext = file.name.split('.').pop().toLowerCase();
            window.EJS_core = (ext === 'gba') ? 'mgba' : 'gambatte';

            // FIX: Correct CDN URL for loader.js
            const loader = document.createElement('script');
            loader.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            document.head.appendChild(loader);
        });
    </script>
</body>
</html>
