<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Game Player</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: white; font-family: sans-serif; 
            overflow: hidden; 
        }
        #game-wrapper { width: 100vw; height: 100vh; }
        #game { width: 100%; height: 100%; }
        
        .nav-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        .btn {
            background: rgba(40, 40, 40, 0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #444;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }
        .btn:hover { background: #007bff; border-color: #007bff; }
    </style>
</head>
<body>

    <div class="nav-overlay">
        <a href="index.html" class="btn">← Back to Library</a>
    </div>

    <div id="game-wrapper">
        <div id="game"></div>
    </div>

    <script>
        // 1. Parse the URL to get the game file and type
        const params = new URLSearchParams(window.location.search);
        const romPath = params.get('game'); // From scanner: "gameboy/pokemon.gb"
        const type = params.get('type');     // From scanner: "gb", "gbc", or "gba"

        if (!romPath) {
            alert("No ROM specified!");
            window.location.href = "index.html";
        }

        // 2. EmulatorJS Configuration
        window.EJS_player = "#game";
        
        // Ensure the path to the ROM is correct based on your folder structure
        // Since the scanner gives "gameboy/file.gb", and the player is in /main/
        window.EJS_gameUrl = romPath; 
        
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        window.EJS_startOnLoaded = true;

        // 3. Map the 'type' to the correct Core
        // 'mgba' is best for GBA, 'gambatte' is best for GB/GBC
        if (type === 'gba') {
            window.EJS_core = 'mgba';
        } else {
            window.EJS_core = 'gambatte';
        }

        // 4. Load the Emulator
        const loader = document.createElement('script');
        loader.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
        document.head.appendChild(loader);
    </script>
</body>
</html>
